---
deployment:
  tasks:
    - export REPOPATH=$(pwd)
    - export APPPATH=/home/joshkato24/apps/coffeepulseuganda
    - export PUBLICPATH=/home/joshkato24/public_html
    - /bin/mkdir -p "$APPPATH"
    - /usr/bin/rsync -a --delete --exclude=".git/" --exclude=".cpanel.yml" --exclude=".env" --exclude="node_modules/" --exclude="vendor/" --exclude="storage/" "$REPOPATH"/ "$APPPATH"/
    - /usr/bin/rsync -a --delete --exclude="index.php" "$APPPATH"/public/ "$PUBLICPATH"/
    - /bin/cp "$APPPATH"/public/index.php "$PUBLICPATH"/index.php
    - /bin/sed -i "s#__DIR__.'/../vendor/autoload.php'#'$APPPATH/vendor/autoload.php'#g" "$PUBLICPATH"/index.php
    - /bin/sed -i "s#__DIR__.'/../bootstrap/app.php'#'$APPPATH/bootstrap/app.php'#g" "$PUBLICPATH"/index.php
    - /bin/sed -i "s#\$maintenance = __DIR__.'/../storage/framework/maintenance.php'#\$maintenance = '$APPPATH/storage/framework/maintenance.php'#g" "$PUBLICPATH"/index.php
    - cd "$APPPATH" && composer install --no-dev --optimize-autoloader --no-interaction
    - cd "$APPPATH" && php artisan migrate --force
    - cd "$APPPATH" && php artisan storage:link || true
    - cd "$APPPATH" && php artisan optimize:clear
    - cd "$APPPATH" && php artisan config:cache
    - cd "$APPPATH" && php artisan route:cache
    - cd "$APPPATH" && php artisan view:cache
