[program:laravel-worker]
directory=/var/www/coffeepulseuganda
command=php artisan queue:work database --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/coffeepulseuganda/storage/logs/worker.log
stopwaitsecs=3600
